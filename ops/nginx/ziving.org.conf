# ziving.org — static site. Campaign API → mcp.winbit32.com (CORS on gateway).
# Orchard scanner / PCZT / cosign relay for on-page wallet-kit → same-origin /api
# (nginx proxy to localhost:3555, same pattern as secresea.com — avoids CORP
# blocking browser fetches to api.zcash.winbit32.com / cosign.winbit32.com).
# Pretty campaign URLs: /p/<slug> → p.html.
#
# Install / refresh (preserve Certbot SSL blocks if already present):
#   sudo cp ops/nginx/ziving.org.conf /etc/nginx/sites-available/ziving.org.conf
#   # then merge SSL listen + cert lines from the live file, OR re-run certbot
#   sudo nginx -t && sudo systemctl reload nginx
#
# Docroot owned by rotwang so Jenkins can rsync without sudo.

server {
	listen 80;
	listen [::]:80;
	server_name ziving.org www.ziving.org;

	# Certbot will redirect HTTP→HTTPS when certificates exist.
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name ziving.org www.ziving.org;

	# Replace with certbot-managed paths if different on this host.
	ssl_certificate /etc/letsencrypt/live/zecmon.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/zecmon.com/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

	root /var/www/ziving.org;
	index index.html;

	location ~ "^/p/[a-z0-9-]{3,48}/?$" {
		add_header Cache-Control "no-cache";
		try_files /p.html =404;
	}

	# Legacy query form still works
	location = /p.html {
		add_header Cache-Control "no-cache";
		try_files $uri =404;
	}

	location = /overlay.html {
		add_header Cache-Control "no-cache";
		try_files $uri =404;
	}

	location = /manage.html {
		add_header Cache-Control "no-cache";
		try_files $uri =404;
	}

	location = /index.html {
		add_header Cache-Control "no-cache";
		try_files $uri =404;
	}

	# Agent/MCP discovery cards (Gopher-over-HTTPS): root agent.gopher +
	# sub-cards under /.well-known/agent/. Served as application/gopher with
	# permissive CORS so browser-side agents (e.g. winbit32's Gopher client)
	# can read them cross-origin — parity with secresea.com / zecbus.com.
	location ~ ^/\.well-known/.+\.gopher$ {
		default_type application/gopher;
		charset utf-8;
		add_header Access-Control-Allow-Origin "*" always;
		add_header X-Content-Type-Options "nosniff" always;
		add_header Cache-Control "public, max-age=600" always;
		try_files $uri =404;
	}

	# Wallet-kit cosign: scanner + PCZT + relay (same-origin → no CORS/CORP fight).
	location /api/ {
		proxy_set_header X-API-Key "723c914231d399b2eff3b4b519e8b50609e036e26965b1eb8de67a35a9c416ca";
		proxy_pass http://127.0.0.1:3555;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		# Helmet on the Node app sets CORP same-origin which breaks browsers
		# even when this location is same-origin to the page — hide it anyway.
		proxy_hide_header Cross-Origin-Resource-Policy;
		proxy_hide_header Cross-Origin-Opener-Policy;
		proxy_read_timeout 300s;
		proxy_send_timeout 300s;
		proxy_buffering off;
		client_max_body_size 25m;
	}

	# JS/CSS are versioned via ?v= on HTML links; keep a short TTL as a backstop
	# so a deploy that forgets to bump the query never sticks for an hour again.
	location ~* \.(?:css|js)$ {
		try_files $uri =404;
		add_header Cache-Control "public, max-age=120, must-revalidate";
	}

	location ~* \.(?:svg|png|ico|woff2?|wasm|map)$ {
		try_files $uri =404;
		add_header Cache-Control "public, max-age=86400";
	}

	location / {
		try_files $uri $uri/ =404;
	}
}

# ziving.org — static site (API calls go to mcp.winbit32.com from the browser;
# CORS is served by the gateway). Pretty campaign URLs: /p/<slug> → p.html.
#
# Install / refresh (preserve Certbot SSL blocks if already present):
#   sudo cp ops/nginx/ziving.org.conf /etc/nginx/sites-available/ziving.org.conf
#   # then merge SSL listen + cert lines from the live file, OR re-run certbot
#   sudo nginx -t && sudo systemctl reload nginx
#
# Docroot owned by rotwang so Jenkins can rsync without sudo.

server {
	listen 80;
	listen [::]:80;
	server_name ziving.org www.ziving.org;

	# Certbot will redirect HTTP→HTTPS when certificates exist.
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name ziving.org www.ziving.org;

	# Replace with certbot-managed paths if different on this host.
	ssl_certificate /etc/letsencrypt/live/zecmon.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/zecmon.com/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

	root /var/www/ziving.org;
	index index.html;

	location ~ "^/p/[a-z0-9-]{3,48}/?$" {
		add_header Cache-Control "no-cache";
		try_files /p.html =404;
	}

	# Legacy query form still works
	location = /p.html {
		add_header Cache-Control "no-cache";
		try_files $uri =404;
	}

	location = /overlay.html {
		add_header Cache-Control "no-cache";
		try_files $uri =404;
	}

	location = /manage.html {
		add_header Cache-Control "no-cache";
		try_files $uri =404;
	}

	location = /index.html {
		add_header Cache-Control "no-cache";
		try_files $uri =404;
	}

	# JS/CSS are versioned via ?v= on HTML links; keep a short TTL as a backstop
	# so a deploy that forgets to bump the query never sticks for an hour again.
	location ~* \.(?:css|js)$ {
		try_files $uri =404;
		add_header Cache-Control "public, max-age=120, must-revalidate";
	}

	location ~* \.(?:svg|png|ico|woff2?|wasm|map)$ {
		try_files $uri =404;
		add_header Cache-Control "public, max-age=86400";
	}

	location / {
		try_files $uri $uri/ =404;
	}
}

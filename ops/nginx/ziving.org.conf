# ziving.org — static site + API proxy to payments-gateway
#
# Install: sudo cp ops/nginx/ziving.org.conf /etc/nginx/sites-available/ziving.org
#          sudo ln -s /etc/nginx/sites-available/ziving.org /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

server {
	listen 80;
	listen [::]:80;
	server_name ziving.org www.ziving.org;

	root /var/www/ziving.org;
	index index.html;

	# Campaign pages — pretty URLs optional; p.html?slug= works out of the box
	location / {
		try_files $uri $uri/ /index.html;
	}

	# Gateway API (same host as winbit32 MCP deployment, or dedicated)
	location /v1/ {
		proxy_pass http://127.0.0.1:8820;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# OBS overlay — must stay cache-bustable
	location = /overlay.html {
		add_header Cache-Control "no-cache";
		try_files $uri =404;
	}
}
